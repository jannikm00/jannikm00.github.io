<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jannik's Website</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            color: #333;
            overflow:hidden;
        }
        /* Container Styles */
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative; /* Added for positioning the cats */
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            margin-top: 0;
            margin-bottom: 15px;
            color: #666;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .icon {
            width: 50px;
            height: auto;
            vertical-align: middle;
            margin-right: 10px;
        }
        .profile-link {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .profile-link img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
            border-radius: 50%;
        }
        .project {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        /* Cat Animation Styles */
        .cat {
            position: absolute;
            pointer-events: none; /* Prevent cats from interfering with user interaction */
            animation: fall linear infinite; /* Apply falling animation */
        }
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg); /* Initial position and rotation */
            }
            100% {
                transform: translateY(calc(100vh + 50px)) rotate(360deg); /* Final position and rotation */
            }
        }
    </style>
</head>
<body>

<!-- Trigger Element for the Easter Egg -->
<button style="margin-left: 10px;" id="cat-flood-trigger">Don't Press!!!</button>

<!-- JavaScript for Cat Animation -->
<script>
    document.getElementById('cat-flood-trigger').addEventListener('click', function() {
        const numCats = 50; // Number of cats to flood the screen
        const container = document.querySelector('.container');
        const bodyWidth = document.body.clientWidth;
        const bodyHeight = document.body.clientHeight;

        for (let i = 0; i < numCats; i++) {
            const cat = document.createElement('img');
            cat.src = 'flocki.png'; // Replace 'cat_image_url.jpg' with the URL of your cat image
            cat.classList.add('cat');
            cat.style.left = Math.random() * bodyWidth + 'px'; // Random horizontal position
            cat.style.top = -50 + Math.random() * bodyHeight + 'px'; // Random vertical position with initial offset
            cat.style.animationDuration = (Math.random() * 2 + 1) + 's'; // Randomize animation duration
            cat.style.animationTimingFunction = 'cubic-bezier(' + Math.random() + ')'; // Random easing function
            cat.style.opacity = Math.random(); // Randomize opacity for each cat
            
            // Randomize rotation direction
            const rotationDirection = Math.random() < 0.5 ? 'normal' : 'reverse'; // Randomly set clockwise or counterclockwise
            cat.style.animationDirection = rotationDirection; // Set rotation direction
            
            container.appendChild(cat);
        }
    });
</script>

<!-- Main Content -->
<div class="container">

        <div>

                         alt="Bitcoin Logo" class="icon">

    <!-- Minecraft Server Project -->
    <div class="project">

                <a href="https://api.mcsrvstat.us/simple/jannikrpi.ddns.net" target="_blank">
                    <img src="https://api.mcsrvstat.us/icon/jannikrpi.ddns.net"
                         alt="Minecraft Server Icon" class="icon">
                    jannikrpi.ddns.net:25565
                </a>
            </p>
            <p>A Minecraft server hosted by me.</p>
        </div>
    </div>

    <!-- GitHub Profile Link -->
    <div class="profile-link">
        <div>
            <p>
                <a href="https://github.com/jannikm00/" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg"
                         alt="GitHub Logo" class="icon">
                    GitHub Profile
                </a>
            </p>
            <p>Checkout my GitHub profile.</p>
        </div>
    </div>

    <!-- Thingiverse Profile Link -->
    <div class="profile-link">
        <a href="https://www.thingiverse.com/jannikm00/designs" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Thingiverse_Logo_192x192.png"
                 alt="Thingiverse Logo" class="icon">

    </div>
    <p>Explore my designs on Thingiverse.</p>
</div>

</body>
</html>
