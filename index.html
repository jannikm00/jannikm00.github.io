<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling while cats are falling */
        }
        .cat {
            position: absolute;
            pointer-events: none; /* Prevent cats from interfering with user interaction */
            animation: fall linear infinite; /* Apply falling animation */
        }
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg); /* Initial position and rotation */
            }
            100% {
                transform: translateY(calc(100vh + 50px)) rotate(360deg); /* Final position and rotation */
            }
        }
    </style>



<!-- This is the trigger element for the easter egg -->
<button style="height:10;width:10;margin-left:1400px" id="cat-flood-trigger">Dont Press!!!</button>







<script>
    // JavaScript code to create cat images and make them fall down
    document.getElementById('cat-flood-trigger').addEventListener('click', function() {
        const numCats = 50; // Number of cats to flood the screen
        const container = document.querySelector('.container');
        const bodyWidth = document.body.clientWidth;
        const bodyHeight = document.body.clientHeight;

        for (let i = 0; i < numCats; i++) {
            const cat = document.createElement('img');
            cat.src = 'flocki.png'; // Replace 'cat_image_url.jpg' with the URL of your cat image
            cat.classList.add('cat');
            cat.style.left = Math.random() * bodyWidth + 'px'; // Random horizontal position
            cat.style.top = Math.random() * bodyHeight + 'px'; // Random vertical position
            cat.style.animationDuration = (Math.random() * 1 + 3) + 's'; // Randomize animation duration
            cat.style.animationTimingFunction = 'cubic-bezier(0.68, 0.17, 0.27, 1.44)'; // Use custom easing function for realistic physics
            cat.style.opacity = Math.random(); // Randomize opacity for each cat
            container.appendChild(cat);
        }
    });
</script>
